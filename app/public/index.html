<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeatherSafe</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="music-control">
      <button onclick="toggleMusic()">Background Music 🎵</button>
    </div>
    <audio id="background-music" loop preload="auto">
      <source src="White Petals by Keys of Moon.mp3" type="audio/mpeg" />
      Your browser does not support the audio element.
    </audio>
    <div class="container">
      <h1><b>WeatherSafe</b></h1>
      <div>
        <h3>Location: <span id="location">Loading...</span></h3>
      </div>
      <div class="search-bar">
        <input
          type="text"
          id="city"
          placeholder="Enter city"
          onkeypress="handleKeyPress(event)"
        />
        <input
          type="text"
          id="state"
          placeholder="Enter state"
          onkeypress="handleKeyPress(event)"
        />
        <button onclick="searchWeather()">Search</button>
      </div>
      <div>
        <h4
          onclick="toggleSection('forecast')"
          tabindex="0"
          role="button"
          aria-expanded="false"
          aria-controls="forecast"
          onkeydown="handleSectionKey(event, 'forecast')"
        >
          <span class="arrow">&#9654;</span> Hourly Forecast
        </h4>
        <div id="forecast" class="collapsible-content"></div>
      </div>
      <div>
        <h4
          onclick="toggleSection('daily')"
          tabindex="0"
          role="button"
          aria-expanded="false"
          aria-controls="daily"
          onkeydown="handleSectionKey(event, 'daily')"
        >
          <span class="arrow">&#9654;</span> Daily Summary
        </h4>
        <div id="daily" class="collapsible-content"></div>
      </div>
      <div>
        <h4
          onclick="toggleSection('alerts')"
          tabindex="0"
          role="button"
          aria-expanded="false"
          aria-controls="alerts"
          onkeydown="handleSectionKey(event, 'alerts')"
        >
          <span class="arrow">&#9654;</span> Weather Alerts
        </h4>
        <div id="alerts" class="collapsible-content"></div>
      </div>
      <div id="random-fact" class="fact">
        <h4>Did you know?</h4>
        <p>Loading a fun weather fact...</p>
      </div>
    </div>
    <script>
      async function fetchWeather() {
        try {
          const ipResponse = await fetch("https://api.ipify.org?format=json");
          const ipData = await ipResponse.json();
          console.log("IP Data:", ipData);

          const response = await fetch(`/api/user-weather?ip=${ipData.ip}`);
          const data = await response.json();

          if (data.error) {
            document.getElementById("location").textContent =
              "We couldn't fetch your location. Please check your internet connection or try again later.";
            return;
          }

          const { city, state } = data.location;
          document.getElementById("location").textContent = `${city}, ${state}`;

          let forecastList = [];
          if (data.forecast) {
            if (Array.isArray(data.forecast)) {
              forecastList = data.forecast;
            } else if (data.forecast.hourly) {
              forecastList = data.forecast.hourly;
            }
          }

          displayWeather(data.alerts, forecastList);
          // Extract daily summaries (if provided) and show them
          let dailyList = [];
          if (
            data.forecast &&
            !Array.isArray(data.forecast) &&
            Array.isArray(data.forecast.daily)
          ) {
            dailyList = data.forecast.daily;
          }
          displayDaily(dailyList);
          notifyMajorAlerts(data.alerts);
        } catch (error) {
          console.error("Error fetching weather data:", error);
          document.getElementById("location").textContent =
            "Error fetching your location data. Please try again later or Enter a location in the search bar below.";
        }
      }

      async function searchWeather() {
        const city = document.getElementById("city").value;
        const state = document.getElementById("state").value;

        if (!city || !state) {
          alert(
            "Please enter both city and state to search for weather information.",
          );
          return;
        }

        document.getElementById("location").textContent = "Loading...";

        try {
          const encodedCity = encodeURIComponent(city);
          const encodedState = encodeURIComponent(state);

          const alertsResponse = await fetch(
            `/api/alerts?city=${encodedCity}&state=${encodedState}`,
          );
          if (!alertsResponse.ok) {
            throw new Error(`Alerts API error: ${alertsResponse.statusText}`);
          }
          const alertsData = await alertsResponse.json();
          console.log("Raw Alerts API Response:", alertsData);

          const forecastResponse = await fetch(
            `/api/weather?city=${encodedCity}&state=${encodedState}`,
          );
          if (!forecastResponse.ok) {
            throw new Error(
              `Forecast API error: ${forecastResponse.statusText}`,
            );
          }
          const forecastData = await forecastResponse.json();
          console.log("Raw Forecast API Response:", forecastData);

          // Validate API response structure
          const alerts = Array.isArray(alertsData.alerts)
            ? alertsData.alerts
            : [];
          console.log("Validated Alerts Data:", alerts);
          let forecast = [];
          if (forecastData.forecast) {
            if (Array.isArray(forecastData.forecast)) {
              forecast = forecastData.forecast;
            } else if (forecastData.forecast.hourly) {
              forecast = forecastData.forecast.hourly;
            }
          }
          console.log("Validated Forecast Data:", forecast);

          if (alerts.length === 0 && forecast.length === 0) {
            throw new Error("No valid weather data received.");
          }

          // Extract daily summaries (if provided) and show them
          let daily = [];
          if (
            forecastData.forecast &&
            !Array.isArray(forecastData.forecast) &&
            Array.isArray(forecastData.forecast.daily)
          ) {
            daily = forecastData.forecast.daily;
          }

          document.getElementById("location").textContent = `${city}, ${state}`;
          displayWeather(alerts, forecast);
          displayDaily(daily);
          notifyMajorAlerts(alerts);
        } catch (error) {
          console.error("Error searching weather data:", error);
          document.getElementById("location").textContent =
            `Error fetching data: ${error.message}. Please try again later.`;
        }
      }

      function notifyMajorAlerts(alerts) {
        console.log("Alerts passed to notifyMajorAlerts:", alerts);
        if (!Array.isArray(alerts) || alerts.length === 0) {
          console.warn("No valid alerts to process in notifyMajorAlerts.");
          return;
        }

        if (Notification.permission !== "granted") {
          console.warn("Notifications are not enabled.");
          return;
        }

        let redAlert = false;
        let yellowAlert = false;
        alerts.forEach((alert) => {
          console.log("Processing alert:", alert);
          if (alert.severity === "Severe" || alert.severity === "Extreme") {
            redAlert = true;
          } else if (alert.severity === "Moderate") {
            yellowAlert = true;
          }
        });

        if (redAlert) {
          new Notification("Severe Weather Alert!", {
            body: "Severe weather conditions detected in your area. Stay safe!",
          });
        } else if (yellowAlert) {
          new Notification("Moderate Weather Alert", {
            body: "Moderate weather conditions detected. Stay cautious!",
          });
        }
      }

      // Note: server now returns wind speeds in mph

      // Helper: convert degrees to compass direction (16-point)
      function degToCompass(num) {
        if (num == null || isNaN(num)) return "Variable";
        const val = Math.floor(num / 22.5 + 0.5);
        const arr = [
          "N",
          "NNE",
          "NE",
          "ENE",
          "E",
          "ESE",
          "SE",
          "SSE",
          "S",
          "SSW",
          "SW",
          "WSW",
          "W",
          "WNW",
          "NW",
          "NNW",
        ];
        return arr[val % 16];
      }

      // Helper: describe wind by mph
      function windDescription(mph) {
        if (mph == null || isNaN(mph)) return "Calm/variable";
        if (mph <= 3) return "Calm";
        if (mph <= 7) return "Light breeze";
        if (mph <= 12) return "Gentle breeze";
        if (mph <= 18) return "Moderate breeze";
        if (mph <= 24) return "Fresh breeze";
        if (mph <= 31) return "Strong breeze";
        return "High winds";
      }

      // Helper: format ISO time to readable hour (local)
      function formatHour(iso) {
        try {
          const dt = new Date(iso);
          return dt.toLocaleTimeString([], {
            hour: "numeric",
            minute: "numeric",
          });
        } catch (e) {
          return iso;
        }
      }

      function displayWeather(alerts, forecast) {
        console.log("Forecast:", forecast);
        console.log("Alerts:", alerts);

        const forecastContainer = document.getElementById("forecast");
        forecastContainer.innerHTML = "";
        if (Array.isArray(forecast) && forecast.length > 0) {
          forecast.forEach((period) => {
            console.log("Period:", period);
            const div = document.createElement("div");
            div.classList.add("forecast");

            const timeLabel = formatHour(period.time);
            const tempLabel =
              period.temp != null ? `${period.temp}°${period.tempUnit}` : "N/A";

            // Server provides wind in mph already
            const windMph =
              period.windSpeed != null ? Math.round(period.windSpeed) : null;
            const windCompass = degToCompass(period.windDir);
            const windDesc = windDescription(windMph);

            const windLabel =
              windMph != null
                ? `${windMph} mph from ${windCompass} (${windDesc})`
                : "Wind: N/A";

            const strong = document.createElement("strong");
            strong.textContent = timeLabel;
            const p = document.createElement("p");
            p.textContent = period.detailedForecast || "";
            const small = document.createElement("small");
            small.textContent = `Temp: ${tempLabel} | ${windLabel}`;

            div.appendChild(strong);
            div.appendChild(p);
            div.appendChild(small);
            forecastContainer.appendChild(div);
          });
        } else {
          forecastContainer.textContent = "No weather forecast available.";
        }

        const alertsContainer = document.getElementById("alerts");
        alertsContainer.innerHTML = "";
        if (Array.isArray(alerts) && alerts.length > 0) {
          alerts.forEach((alert) => {
            console.log("Alert:", alert);
            const div = document.createElement("div");
            div.classList.add("alert");

            const strong = document.createElement("strong");
            strong.textContent = alert.headline || "";
            const p = document.createElement("p");
            p.textContent = alert.description || "";
            const small = document.createElement("small");
            small.textContent = `Area: ${alert.area} | Severity: ${alert.severity} | Sent: ${alert.sent}`;

            div.appendChild(strong);
            div.appendChild(p);
            div.appendChild(small);
            alertsContainer.appendChild(div);
          });
        } else {
          alertsContainer.textContent = "No weather alerts available.";
        }
      }

      function displayDaily(daily) {
        const dailyContainer = document.getElementById("daily");
        dailyContainer.innerHTML = "";
        if (!Array.isArray(daily) || daily.length === 0) {
          dailyContainer.textContent = "No daily summary available.";
          return;
        }

        daily.forEach((day) => {
          const div = document.createElement("div");
          div.classList.add("forecast");

          const strong = document.createElement("strong");
          strong.textContent = day.date || "";

          const p = document.createElement("p");
          p.textContent = `High: ${day.maxTemp}°${day.tempUnit} — Low: ${day.minTemp}°${day.tempUnit}`;

          const small = document.createElement("small");
          small.textContent = `Precip: ${day.precipitation} mm | Max wind: ${day.maxWindSpeed} mph`;

          div.appendChild(strong);
          div.appendChild(p);
          div.appendChild(small);
          dailyContainer.appendChild(div);
        });
      }

      function toggleSection(sectionId) {
        const section = document.getElementById(sectionId);
        if (!section) return;
        const header = section.previousElementSibling;
        const arrow = header ? header.querySelector(".arrow") : null;
        const isOpen = section.classList.contains(
          "collapsible-content--expanded",
        );
        if (!isOpen) {
          section.classList.add("collapsible-content--expanded");
          if (arrow) arrow.innerHTML = "&#9660;";
          if (header) header.setAttribute("aria-expanded", "true");
        } else {
          section.classList.remove("collapsible-content--expanded");
          if (arrow) arrow.innerHTML = "&#9654;";
          if (header) header.setAttribute("aria-expanded", "false");
        }
      }

      function handleSectionKey(event, sectionId) {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          toggleSection(sectionId);
        }
      }

      function handleKeyPress(event) {
        if (event.key === "Enter") {
          searchWeather();
        }
      }

      async function fetchRandomFact() {
        try {
          const response = await fetch("/api/random-fact");
          const data = await response.json();
          document.querySelector("#random-fact p").textContent = data.fact;
        } catch (error) {
          console.error("Error fetching random fact:", error);
          document.querySelector("#random-fact p").textContent =
            "Unable to load a fun fact. Please refresh the page.";
        }
      }

      async function toggleMusic() {
        const music = document.getElementById("background-music");
        const btn = document.querySelector(".music-control button");
        try {
          if (music.paused) {
            await music.play();
            if (btn) btn.textContent = "Pause Music ⏸️";
          } else {
            music.pause();
            if (btn) btn.textContent = "Background Music 🎵";
          }
        } catch (err) {
          console.error("Music play error:", err);
          alert(
            "Unable to play audio. The browser may block playback or the file may be unavailable.",
          );
        }
      }

      window.onload = () => {
        fetchWeather();
        const forecastEl = document.getElementById("forecast");
        const dailyEl = document.getElementById("daily");
        const alertsEl = document.getElementById("alerts");
        if (forecastEl)
          forecastEl.classList.remove("collapsible-content--expanded");
        if (dailyEl) dailyEl.classList.remove("collapsible-content--expanded");
        if (alertsEl)
          alertsEl.classList.remove("collapsible-content--expanded");
        // Set ARIA attributes for initial state
        const headerForecast = document.querySelector(
          "h4[aria-controls='forecast']",
        );
        const headerDaily = document.querySelector("h4[aria-controls='daily']");
        const headerAlerts = document.querySelector(
          "h4[aria-controls='alerts']",
        );
        if (headerForecast)
          headerForecast.setAttribute("aria-expanded", "false");
        if (headerDaily) headerDaily.setAttribute("aria-expanded", "false");
        if (headerAlerts) headerAlerts.setAttribute("aria-expanded", "false");
        fetchRandomFact();
        const _btn = document.querySelector(".music-control button");
        const _music = document.getElementById("background-music");
        if (_btn && _music)
          _btn.textContent = _music.paused
            ? "Background Music 🎵"
            : "Pause Music ⏸️";
      };
    </script>
  </body>
</html>
