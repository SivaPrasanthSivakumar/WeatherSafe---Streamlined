<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeatherSafe</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="music-control">
      <button onclick="toggleMusic()">Background Music 🎵</button>
    </div>
    <audio id="background-music" loop>
      <source src="White Petals by Keys of Moon.mp3" type="audio/mpeg" />
      Your browser does not support the audio element.
    </audio>
    <div class="container">
      <h1><b>WeatherSafe</b></h1>
      <div>
        <h3>Location: <span id="location">Loading...</span></h3>
      </div>
      <div class="search-bar">
        <input
          type="text"
          id="city"
          placeholder="Enter city"
          onkeypress="handleKeyPress(event)"
        />
        <input
          type="text"
          id="state"
          placeholder="Enter state"
          onkeypress="handleKeyPress(event)"
        />
        <button onclick="searchWeather()">Search</button>
      </div>
      <div>
        <h4
          onclick="toggleSection('forecast')"
          tabindex="0"
          role="button"
          aria-expanded="false"
          aria-controls="forecast"
          onkeydown="handleSectionKey(event, 'forecast')"
        >
          <span class="arrow">&#9654;</span> Weather Forecast
        </h4>
        <div id="forecast" class="collapsible-content"></div>
      </div>
      <div>
        <h4
          onclick="toggleSection('alerts')"
          tabindex="0"
          role="button"
          aria-expanded="false"
          aria-controls="alerts"
          onkeydown="handleSectionKey(event, 'alerts')"
        >
          <span class="arrow">&#9654;</span> Weather Alerts
        </h4>
        <div id="alerts" class="collapsible-content"></div>
      </div>
      <div id="random-fact" class="fact">
        <h4>Did you know?</h4>
        <p>Loading a fun weather fact...</p>
      </div>
    </div>
    <script>
      async function fetchWeather() {
        try {
          const ipResponse = await fetch("https://api.ipify.org?format=json");
          const ipData = await ipResponse.json();
          console.log("IP Data:", ipData);

          const response = await fetch(`/api/user-weather?ip=${ipData.ip}`);
          const data = await response.json();

          if (data.error) {
            document.getElementById("location").textContent =
              "We couldn't fetch your location. Please check your internet connection or try again later.";
            return;
          }

          const { city, state } = data.location;
          document.getElementById("location").textContent = `${city}, ${state}`;

          displayWeather(data.alerts, data.forecast);
          notifyMajorAlerts(data.alerts);
        } catch (error) {
          console.error("Error fetching weather data:", error);
          document.getElementById("location").textContent =
            "Error fetching your location data. Please try again later or Enter a location in the search bar below.";
        }
      }

      async function searchWeather() {
        const city = document.getElementById("city").value;
        const state = document.getElementById("state").value;

        if (!city || !state) {
          alert(
            "Please enter both city and state to search for weather information.",
          );
          return;
        }

        document.getElementById("location").textContent = "Loading...";

        try {
          const alertsResponse = await fetch(
            `/api/alerts?city=${city}&state=${state}`,
          );
          if (!alertsResponse.ok) {
            throw new Error(`Alerts API error: ${alertsResponse.statusText}`);
          }
          const alertsData = await alertsResponse.json();
          console.log("Raw Alerts API Response:", alertsData);

          const forecastResponse = await fetch(
            `/api/weather?city=${city}&state=${state}`,
          );
          if (!forecastResponse.ok) {
            throw new Error(
              `Forecast API error: ${forecastResponse.statusText}`,
            );
          }
          const forecastData = await forecastResponse.json();
          console.log("Raw Forecast API Response:", forecastData);

          // Validate API response structure
          const alerts = Array.isArray(alertsData.alerts)
            ? alertsData.alerts
            : [];
          console.log("Validated Alerts Data:", alerts);
          const forecast = Array.isArray(forecastData.forecast)
            ? forecastData.forecast
            : [];
          console.log("Validated Forecast Data:", forecast);

          if (alerts.length === 0 && forecast.length === 0) {
            throw new Error("No valid weather data received.");
          }

          document.getElementById("location").textContent = `${city}, ${state}`;
          displayWeather(alerts, forecast);
          notifyMajorAlerts(alerts);
        } catch (error) {
          console.error("Error searching weather data:", error);
          document.getElementById("location").textContent =
            `Error fetching data: ${error.message}. Please try again later.`;
        }
      }

      function notifyMajorAlerts(alerts) {
        console.log("Alerts passed to notifyMajorAlerts:", alerts);
        if (!Array.isArray(alerts) || alerts.length === 0) {
          console.warn("No valid alerts to process in notifyMajorAlerts.");
          return;
        }

        if (Notification.permission !== "granted") {
          console.warn("Notifications are not enabled.");
          return;
        }

        let redAlert = false;
        let yellowAlert = false;
        alerts.forEach((alert) => {
          console.log("Processing alert:", alert);
          if (alert.severity === "Severe" || alert.severity === "Extreme") {
            redAlert = true;
          } else if (alert.severity === "Moderate") {
            yellowAlert = true;
          }
        });

        if (redAlert) {
          new Notification("Severe Weather Alert!", {
            body: "Severe weather conditions detected in your area. Stay safe!",
          });
        } else if (yellowAlert) {
          new Notification("Moderate Weather Alert", {
            body: "Moderate weather conditions detected. Stay cautious!",
          });
        }
      }

      function displayWeather(alerts, forecast) {
        console.log("Forecast:", forecast);
        console.log("Alerts:", alerts);

        const forecastContainer = document.getElementById("forecast");
        forecastContainer.innerHTML = "";
        if (Array.isArray(forecast) && forecast.length > 0) {
          forecast.forEach((period) => {
            console.log("Period:", period);
            const div = document.createElement("div");
            div.classList.add("forecast");
            div.innerHTML = `
              <strong>${period.time}</strong>
              <p>${period.detailedForecast}</p>
              <small>Temp: ${period.temp} ${period.tempUnit} | Wind: ${period.windSpeed} ${period.windDir}</small>
            `;
            forecastContainer.appendChild(div);
          });
        } else {
          forecastContainer.textContent = "No weather forecast available.";
        }

        const alertsContainer = document.getElementById("alerts");
        alertsContainer.innerHTML = "";
        if (Array.isArray(alerts) && alerts.length > 0) {
          alerts.forEach((alert) => {
            console.log("Alert:", alert);
            const div = document.createElement("div");
            div.classList.add("alert");
            div.innerHTML = `
              <strong>${alert.headline}</strong>
              <p>${alert.description}</p>
              <small>Area: ${alert.area} | Severity: ${alert.severity} | Sent: ${alert.sent}</small>
            `;
            alertsContainer.appendChild(div);
          });
        } else {
          alertsContainer.textContent = "No weather alerts available.";
        }
      }

      function toggleSection(sectionId) {
        const section = document.getElementById(sectionId);
        const header = section.previousElementSibling;
        const arrow = header.querySelector(".arrow");
        const isOpen = section.style.display === "block";
        if (!isOpen) {
          section.style.display = "block";
          arrow.innerHTML = "&#9660;";
          header.setAttribute("aria-expanded", "true");
        } else {
          section.style.display = "none";
          arrow.innerHTML = "&#9654;";
          header.setAttribute("aria-expanded", "false");
        }
      }

      function handleSectionKey(event, sectionId) {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          toggleSection(sectionId);
        }
      }

      function handleKeyPress(event) {
        if (event.key === "Enter") {
          searchWeather();
        }
      }

      async function fetchRandomFact() {
        try {
          const response = await fetch("/api/random-fact");
          const data = await response.json();
          document.querySelector("#random-fact p").textContent = data.fact;
        } catch (error) {
          console.error("Error fetching random fact:", error);
          document.querySelector("#random-fact p").textContent =
            "Unable to load a fun fact. Please refresh the page.";
        }
      }

      function toggleMusic() {
        const music = document.getElementById("background-music");
        if (music.paused) {
          music.play();
        } else {
          music.pause();
        }
      }

      window.onload = () => {
        fetchWeather();
        document.getElementById("forecast").style.display = "none";
        document.getElementById("alerts").style.display = "none";
        // Set ARIA attributes for initial state
        document
          .querySelector("h4[aria-controls='forecast']")
          .setAttribute("aria-expanded", "false");
        document
          .querySelector("h4[aria-controls='alerts']")
          .setAttribute("aria-expanded", "false");
        fetchRandomFact();
      };
    </script>
  </body>
</html>
